slug: binary-tree-level-order-traversal
patterns:
- Tree
- Breadth-First Search
- Binary Tree
description_rst: |
  Given the ``root`` of a binary tree, return *the level order traversal
  of its nodes' values*. (i.e., from left to right, level by level).

   

  **Example 1:**

  |image1|

  ::


     Input: root = [3,9,20,null,null,15,7]
     Output: [[3],[9,20],[15,7]]

  **Example 2:**

  ::


     Input: root = [1]
     Output: [[1]]

  **Example 3:**

  ::


     Input: root = []
     Output: []

   

  **Constraints:**

  - The number of nodes in the tree is in the range ``[0, 2000]``.
  - ``-1000 <= Node.val <= 1000``

  .. |image1| image:: https://assets.leetcode.com/uploads/2021/02/19/tree1.jpg
solutions:
- name: Approach 1
  explanation: |
    A level order traversal is a breadth-first traversal of a binary tree. Track
    all the nodes in the current level and add their values to the traversal. At
    the same time, add their children to the next level. We finish traversing once
    all the chilren are ``None``.
  complexity: |
    | :math:`n` is the number of nodes in the binary tree
    | Time: :math:`O(n)` — visit each node once
    | Auxiliary Space: :math:`O(n)` — `next_level` holds one level of nodes, up to
    :math:`O(n / 2)` for a full binary tree
