slug: house-robber-ii
patterns:
- Array
- Dynamic Programming
description_rst: "You are a professional robber planning to rob houses along a street.\nEach house has a certain amount of money stashed. All houses at this\nplace are **arranged in a circle.** That means the first house is the\nneighbor of the last one. Meanwhile, adjacent houses have a security\nsystem connected, and **it will automatically contact the police if two\nadjacent houses were broken into on the same night**.\n\nGiven an integer array ``nums`` representing the amount of money of each\nhouse, return *the maximum amount of money you can rob tonight*\n**without alerting the police**.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: nums = [2,3,2]\n   Output: 3\n   Explanation: You cannot rob house 1 (money = 2) and then rob house 3 (money = 2), because they are adjacent houses.\n\n**Example 2:**\n\n::\n\n\n   Input: nums = [1,2,3,1]\n   Output: 4\n   Explanation: Rob house 1 (money = 1) and then rob house 3 (money = 3).\n   Total amount you can rob = 1 + 3 = 4.\n\n**Example 3:**\n\n\
  ::\n\n\n   Input: nums = [1,2,3]\n   Output: 3\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 100``\n- ``0 <= nums[i] <= 1000``\n"
solutions:
