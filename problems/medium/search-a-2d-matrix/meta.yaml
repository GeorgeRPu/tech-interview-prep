description_rst: "You are given an ``m x n`` integer matrix ``matrix`` with the following\ntwo properties:\n\n- Each row is sorted in non-decreasing order.\n- The first integer of each row is greater than the last integer of the\n  previous row.\n\nGiven an integer ``target``, return ``true`` *if* ``target`` *is in*\n``matrix`` *or* ``false`` *otherwise*.\n\nYou must write a solution in ``O(log(m * n))`` time complexity.\n\n \n\n**Example 1:**\n\n|image1|\n\n::\n\n\n   Input: matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 3\n   Output: true\n\n**Example 2:**\n\n|image2|\n\n::\n\n\n   Input: matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 13\n   Output: false\n\n \n\n**Constraints:**\n\n- ``m == matrix.length``\n- ``n == matrix[i].length``\n- ``1 <= m, n <= 100``\n- ``-10``\\ :sup:```4```\\ ``<= matrix[i][j], target <= 10``\\ :sup:```4```\n\n.. |image1| image:: https://assets.leetcode.com/uploads/2020/10/05/mat.jpg\n.. |image2| image:: https://assets.leetcode.com/uploads/2020/10/05/mat2.jpg\n"
