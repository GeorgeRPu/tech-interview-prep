slug: copy-list-with-random-pointer
patterns:
- Hash Table
- Linked List
description_rst: "A linked list of length ``n`` is given such that each node contains an\nadditional random pointer, which could point to any node in the list, or\n``null``.\n\nConstruct a `deep\ncopy <https://en.wikipedia.org/wiki/Object_copying#Deep_copy>`__ of the\nlist. The deep copy should consist of exactly ``n`` **brand new** nodes,\nwhere each new node has its value set to the value of its corresponding\noriginal node. Both the ``next`` and ``random`` pointer of the new nodes\nshould point to new nodes in the copied list such that the pointers in\nthe original list and copied list represent the same list state. **None\nof the pointers in the new list should point to nodes in the original\nlist**.\n\nFor example, if there are two nodes ``X`` and ``Y`` in the original\nlist, where ``X.random --> Y``, then for the corresponding two nodes\n``x`` and ``y`` in the copied list, ``x.random --> y``.\n\nReturn *the head of the copied linked list*.\n\nThe linked list is represented in the input/output\
  \ as a list of ``n``\nnodes. Each node is represented as a pair of ``[val, random_index]``\nwhere:\n\n- ``val``: an integer representing ``Node.val``\n- ``random_index``: the index of the node (range from ``0`` to ``n-1``)\n  that the ``random`` pointer points to, or ``null`` if it does not\n  point to any node.\n\nYour code will **only** be given the ``head`` of the original linked\nlist.\n\n \n\n**Example 1:**\n\n|image1|\n\n::\n\n\n   Input: head = [[7,null],[13,0],[11,4],[10,2],[1,0]]\n   Output: [[7,null],[13,0],[11,4],[10,2],[1,0]]\n\n**Example 2:**\n\n|image2|\n\n::\n\n\n   Input: head = [[1,1],[2,1]]\n   Output: [[1,1],[2,1]]\n\n**Example 3:**\n\n::\n\n\n   Input: head = [[3,null],[3,0],[3,null]]\n   Output: [[3,null],[3,0],[3,null]]\n\n \n\n**Constraints:**\n\n- ``0 <= n <= 1000``\n- ``-10``\\ :sup:```4```\\ ``<= Node.val <= 10``\\ :sup:```4```\n- ``Node.random`` is ``null`` or is pointing to some node in the linked\n  list.\n\n.. |image1| image:: https://assets.leetcode.com/uploads/2019/12/18/e1.png\n\
  .. |image2| image:: https://assets.leetcode.com/uploads/2019/12/18/e2.png\n"
