description_rst: "You are a professional robber planning to rob houses along a street.\nEach house has a certain amount of money stashed, the only constraint\nstopping you from robbing each of them is that adjacent houses have\nsecurity systems connected and **it will automatically contact the\npolice if two adjacent houses were broken into on the same night**.\n\nGiven an integer array ``nums`` representing the amount of money of each\nhouse, return *the maximum amount of money you can rob tonight*\n**without alerting the police**.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: nums = [1,2,3,1]\n   Output: 4\n   Explanation: Rob house 1 (money = 1) and then rob house 3 (money = 3).\n   Total amount you can rob = 1 + 3 = 4.\n\n**Example 2:**\n\n::\n\n\n   Input: nums = [2,7,9,3,1]\n   Output: 12\n   Explanation: Rob house 1 (money = 2), rob house 3 (money = 9) and rob house 5 (money = 1).\n   Total amount you can rob = 2 + 9 + 1 = 12.\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 100``\n\
  - ``0 <= nums[i] <= 400``\n"
