description_rst: "Given an integer array ``nums`` and an integer ``k``, return *the* ``k``\n*most frequent elements*. You may return the answer in **any order**.\n\n \n\n**Example 1:**\n\n.. container:: example-block\n\n   **Input:** nums = [1,1,1,2,2,3], k = 2\n\n   **Output:** [1,2]\n\n**Example 2:**\n\n.. container:: example-block\n\n   **Input:** nums = [1], k = 1\n\n   **Output:** [1]\n\n**Example 3:**\n\n.. container:: example-block\n\n   **Input:** nums = [1,2,1,2,1,2,3,1,3,2], k = 2\n\n   **Output:** [1,2]\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 10``\\ :sup:```5```\n- ``-10``\\ :sup:```4```\\ ``<= nums[i] <= 10``\\ :sup:```4```\n- ``k`` is in the range\n  ``[1, the number of unique elements in the array]``.\n- It is **guaranteed** that the answer is **unique**.\n\n \n\n**Follow up:** Your algorithm's time complexity must be better than\n``O(n log n)``, where n is the array's size.\n"
