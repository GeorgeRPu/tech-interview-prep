description_rst: "You are given an array of strings ``tokens`` that represents an\narithmetic expression in a `Reverse Polish\nNotation <http://en.wikipedia.org/wiki/Reverse_Polish_notation>`__.\n\nEvaluate the expression. Return *an integer that represents the value of\nthe expression*.\n\n**Note** that:\n\n- The valid operators are ``'+'``, ``'-'``, ``'*'``, and ``'/'``.\n- Each operand may be an integer or another expression.\n- The division between two integers always **truncates toward zero**.\n- There will not be any division by zero.\n- The input represents a valid arithmetic expression in a reverse polish\n  notation.\n- The answer and all the intermediate calculations can be represented in\n  a **32-bit** integer.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: tokens = [\"2\",\"1\",\"+\",\"3\",\"*\"]\n   Output: 9\n   Explanation: ((2 + 1) * 3) = 9\n\n**Example 2:**\n\n::\n\n\n   Input: tokens = [\"4\",\"13\",\"5\",\"/\",\"+\"]\n   Output: 6\n   Explanation: (4 + (13 / 5)) = 6\n\n\
  **Example 3:**\n\n::\n\n\n   Input: tokens = [\"10\",\"6\",\"9\",\"3\",\"+\",\"-11\",\"*\",\"/\",\"*\",\"17\",\"+\",\"5\",\"+\"]\n   Output: 22\n   Explanation: ((10 * (6 / ((9 + 3) * -11))) + 17) + 5\n   = ((10 * (6 / (12 * -11))) + 17) + 5\n   = ((10 * (6 / -132)) + 17) + 5\n   = ((10 * 0) + 17) + 5\n   = (0 + 17) + 5\n   = 17 + 5\n   = 22\n\n \n\n**Constraints:**\n\n- ``1 <= tokens.length <= 10``\\ :sup:```4```\n- ``tokens[i]`` is either an operator: ``\"+\"``, ``\"-\"``, ``\"*\"``, or\n  ``\"/\"``, or an integer in the range ``[-200, 200]``.\n"
