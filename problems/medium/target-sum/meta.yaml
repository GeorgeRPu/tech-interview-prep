description_rst: "You are given an integer array ``nums`` and an integer ``target``.\n\nYou want to build an **expression** out of nums by adding one of the\nsymbols ``'+'`` and ``'-'`` before each integer in nums and then\nconcatenate all the integers.\n\n- For example, if ``nums = [2, 1]``, you can add a ``'+'`` before ``2``\n  and a ``'-'`` before ``1`` and concatenate them to build the\n  expression ``\"+2-1\"``.\n\nReturn the number of different **expressions** that you can build, which\nevaluates to ``target``.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: nums = [1,1,1,1,1], target = 3\n   Output: 5\n   Explanation: There are 5 ways to assign symbols to make the sum of nums be target 3.\n   -1 + 1 + 1 + 1 + 1 = 3\n   +1 - 1 + 1 + 1 + 1 = 3\n   +1 + 1 - 1 + 1 + 1 = 3\n   +1 + 1 + 1 - 1 + 1 = 3\n   +1 + 1 + 1 + 1 - 1 = 3\n\n**Example 2:**\n\n::\n\n\n   Input: nums = [1], target = 1\n   Output: 1\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 20``\n- ``0 <= nums[i] <= 1000``\n- ``0\
  \ <= sum(nums[i]) <= 1000``\n- ``-1000 <= target <= 1000``\n"
