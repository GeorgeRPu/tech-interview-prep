description_rst: "Given an integer array ``nums`` that may contain duplicates, return *all\npossible* subsets *(the power set)*.\n\nThe solution set **must not** contain duplicate subsets. Return the\nsolution in **any order**.\n\n \n\n**Example 1:**\n\n::\n\n   Input: nums = [1,2,2]\n   Output: [[],[1],[1,2],[1,2,2],[2],[2,2]]\n\n**Example 2:**\n\n::\n\n   Input: nums = [0]\n   Output: [[],[0]]\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 10``\n- ``-10 <= nums[i] <= 10``\n"
