description_rst: "Given the ``root`` of a binary tree, *determine if it is a valid binary\nsearch tree (BST)*.\n\nA **valid BST** is defined as follows:\n\n- The left subtree of a node contains only nodes with keys **strictly\n  less than** the node's key.\n- The right subtree of a node contains only nodes with keys **strictly\n  greater than** the node's key.\n- Both the left and right subtrees must also be binary search trees.\n\n \n\n**Example 1:**\n\n|image1|\n\n::\n\n\n   Input: root = [2,1,3]\n   Output: true\n\n**Example 2:**\n\n|image2|\n\n::\n\n\n   Input: root = [5,1,4,null,null,3,6]\n   Output: false\n   Explanation: The root node's value is 5 but its right child's value is 4.\n\n \n\n**Constraints:**\n\n- The number of nodes in the tree is in the range\n  ``[1, 10``\\ :sup:```4```\\ ``]``.\n- ``-2``\\ :sup:```31```\\ ``<= Node.val <= 2``\\ :sup:```31```\\ ``- 1``\n\n.. |image1| image:: https://assets.leetcode.com/uploads/2020/12/01/tree1.jpg\n.. |image2| image:: https://assets.leetcode.com/uploads/2020/12/01/tree2.jpg\n"
