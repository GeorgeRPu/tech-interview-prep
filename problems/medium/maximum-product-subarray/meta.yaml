description_rst: "Given an integer array ``nums``, find a subarray that has the largest\nproduct, and return *the product*.\n\nThe test cases are generated so that the answer will fit in a **32-bit**\ninteger.\n\n**Note** that the product of an array with a single element is the value\nof that element.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: nums = [2,3,-2,4]\n   Output: 6\n   Explanation: [2,3] has the largest product 6.\n\n**Example 2:**\n\n::\n\n\n   Input: nums = [-2,0,-1]\n   Output: 0\n   Explanation: The result cannot be 2, because [-2,-1] is not a subarray.\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 2 * 10``\\ :sup:```4```\n- ``-10 <= nums[i] <= 10``\n- The product of any subarray of ``nums`` is **guaranteed** to fit in a\n  **32-bit** integer.\n"
