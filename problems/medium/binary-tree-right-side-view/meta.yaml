description_rst: "Given the ``root`` of a binary tree, imagine yourself standing on the\n**right side** of it, return *the values of the nodes you can see\nordered from top to bottom*.\n\n \n\n**Example 1:**\n\n.. container:: example-block\n\n   **Input:** root = [1,2,3,null,5,null,4]\n\n   **Output:** [1,3,4]\n\n   **Explanation:**\n\n   |image1|\n\n**Example 2:**\n\n.. container:: example-block\n\n   **Input:** root = [1,2,3,4,null,null,null,5]\n\n   **Output:** [1,3,4,5]\n\n   **Explanation:**\n\n   |image2|\n\n**Example 3:**\n\n.. container:: example-block\n\n   **Input:** root = [1,null,3]\n\n   **Output:** [1,3]\n\n**Example 4:**\n\n.. container:: example-block\n\n   **Input:** root = []\n\n   **Output:** []\n\n \n\n**Constraints:**\n\n- The number of nodes in the tree is in the range ``[0, 100]``.\n- ``-100 <= Node.val <= 100``\n\n.. |image1| image:: https://assets.leetcode.com/uploads/2024/11/24/tmpd5jn43fs-1.png\n.. |image2| image:: https://assets.leetcode.com/uploads/2024/11/24/tmpkpe40xeh-1.png\n"
