description_rst: "Design a stack that supports push, pop, top, and retrieving the minimum\nelement in constant time.\n\nImplement the ``MinStack`` class:\n\n- ``MinStack()`` initializes the stack object.\n- ``void push(int val)`` pushes the element ``val`` onto the stack.\n- ``void pop()`` removes the element on the top of the stack.\n- ``int top()`` gets the top element of the stack.\n- ``int getMin()`` retrieves the minimum element in the stack.\n\nYou must implement a solution with ``O(1)`` time complexity for each\nfunction.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input\n   [\"MinStack\",\"push\",\"push\",\"push\",\"getMin\",\"pop\",\"top\",\"getMin\"]\n   [[],[-2],[0],[-3],[],[],[],[]]\n\n   Output\n   [null,null,null,null,-3,null,0,-2]\n\n   Explanation\n   MinStack minStack = new MinStack();\n   minStack.push(-2);\n   minStack.push(0);\n   minStack.push(-3);\n   minStack.getMin(); // return -3\n   minStack.pop();\n   minStack.top();    // return 0\n   minStack.getMin(); // return -2\n\
  \n \n\n**Constraints:**\n\n- ``-2``\\ :sup:```31```\\ ``<= val <= 2``\\ :sup:```31```\\ ``- 1``\n- Methods ``pop``, ``top`` and ``getMin`` operations will always be\n  called on **non-empty** stacks.\n- At most ``3 * 10``\\ :sup:```4``` calls will be made to ``push``,\n  ``pop``, ``top``, and ``getMin``.\n"
