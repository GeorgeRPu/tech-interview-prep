slug: group-anagrams
patterns:
- Array
- Hash Table
- String
- Sorting
description_rst: |
  Given an array of strings ``strs``, group the anagrams together. You can
  return the answer in **any order**.

   

  **Example 1:**

  .. container:: example-block

     **Input:** strs = ["eat","tea","tan","ate","nat","bat"]

     **Output:** [["bat"],["nat","tan"],["ate","eat","tea"]]

     **Explanation:**

     - There is no string in strs that can be rearranged to form
       ``"bat"``.
     - The strings ``"nat"`` and ``"tan"`` are anagrams as they can be
       rearranged to form each other.
     - The strings ``"ate"``, ``"eat"``, and ``"tea"`` are anagrams as
       they can be rearranged to form each other.

  **Example 2:**

  .. container:: example-block

     **Input:** strs = [""]

     **Output:** [[""]]

  **Example 3:**

  .. container:: example-block

     **Input:** strs = ["a"]

     **Output:** [["a"]]

   

  **Constraints:**

  - ``1 <= strs.length <= 10``\ :sup:```4```
  - ``0 <= strs[i].length <= 100``
  - ``strs[i]`` consists of lowercase English letters.
solutions:
- name: Character Count
  explanation: |
    We can check whether 2 strings are anagrams by counting the number of each
    letter. For each string, we create a counter. Using a dictionary counter ->
    group (``list``), we iterate through all the counters and add the string to
    the group. Normally, we would use a dictionary but dictonaries are not
    hashable. Instead, we take advantage of the fact that the string only
    contains lowercase letters, meaning we can use a length 26 tuple as the
    counter.
  complexity: |
    :math:`n` is the number of strings in the input array, :math:`k` is the maximum length of a string in the input array

    .. list-table::
       :header-rows: 1
       :widths: auto

       * - Measure
         - Complexity
         - Notes
       * - Time
         - :math:`O(nk)`
         - compare each string to groups
       * - Auxiliary Space
         - :math:`O(n)`
         - store frequency dictionary for each group
