description_rst: "Given an array of integers ``nums`` containing ``n + 1`` integers where\neach integer is in the range ``[1, n]`` inclusive.\n\nThere is only **one repeated number** in ``nums``, return\n*this repeated number*.\n\nYou must solve the problem **without** modifying the array ``nums`` and\nusing only constant extra space.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: nums = [1,3,4,2,2]\n   Output: 2\n\n**Example 2:**\n\n::\n\n\n   Input: nums = [3,1,3,4,2]\n   Output: 3\n\n**Example 3:**\n\n::\n\n\n   Input: nums = [3,3,3,3,3]\n   Output: 3\n\n \n\n**Constraints:**\n\n- ``1 <= n <= 10``\\ :sup:```5```\n- ``nums.length == n + 1``\n- ``1 <= nums[i] <= n``\n- All the integers in ``nums`` appear only **once** except for\n  **precisely one integer** which appears **two or more** times.\n\n \n\n**Follow up:**\n\n- How can we prove that at least one duplicate number must exist in\n  ``nums``?\n- Can you solve the problem in linear runtime complexity?\n"
solutions:
