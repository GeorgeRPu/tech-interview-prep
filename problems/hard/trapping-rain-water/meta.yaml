description_rst: "Given ``n`` non-negative integers representing an elevation map where\nthe width of each bar is ``1``, compute how much water it can trap after\nraining.\n\n \n\n**Example 1:**\n\n|image1|\n\n::\n\n\n   Input: height = [0,1,0,2,1,0,1,3,2,1,2,1]\n   Output: 6\n   Explanation: The above elevation map (black section) is represented by array [0,1,0,2,1,0,1,3,2,1,2,1]. In this case, 6 units of rain water (blue section) are being trapped.\n\n**Example 2:**\n\n::\n\n\n   Input: height = [4,2,0,3,2,5]\n   Output: 9\n\n \n\n**Constraints:**\n\n- ``n == height.length``\n- ``1 <= n <= 2 * 10``\\ :sup:```4```\n- ``0 <= height[i] <= 10``\\ :sup:```5```\n\n.. |image1| image:: https://assets.leetcode.com/uploads/2018/10/22/rainwatertrap.png\n"
