description_rst: "You are given an array of integers ``nums``, there is a sliding window\nof size ``k`` which is moving from the very left of the array to the\nvery right. You can only see the ``k`` numbers in the window. Each time\nthe sliding window moves right by one position.\n\nReturn *the max sliding window*.\n\n \n\n**Example 1:**\n\n::\n\n\n   Input: nums = [1,3,-1,-3,5,3,6,7], k = 3\n   Output: [3,3,5,5,6,7]\n   Explanation: \n   Window position                Max\n   ---------------               -----\n   [1  3  -1] -3  5  3  6  7       3\n    1 [3  -1  -3] 5  3  6  7       3\n    1  3 [-1  -3  5] 3  6  7       5\n    1  3  -1 [-3  5  3] 6  7       5\n    1  3  -1  -3 [5  3  6] 7       6\n    1  3  -1  -3  5 [3  6  7]      7\n\n**Example 2:**\n\n::\n\n\n   Input: nums = [1], k = 1\n   Output: [1]\n\n \n\n**Constraints:**\n\n- ``1 <= nums.length <= 10``\\ :sup:```5```\n- ``-10``\\ :sup:```4```\\ ``<= nums[i] <= 10``\\ :sup:```4```\n- ``1 <= k <= nums.length``\n"
