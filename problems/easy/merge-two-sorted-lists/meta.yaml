slug: merge-two-sorted-lists
patterns:
- Linked List
- Recursion
description_rst: |
  You are given the heads of two sorted linked lists ``list1`` and
  ``list2``.

  Merge the two lists into one **sorted** list. The list should be made by
  splicing together the nodes of the first two lists.

  Return *the head of the merged linked list*.

   

  **Example 1:**

  |image1|

  ::


     Input: list1 = [1,2,4], list2 = [1,3,4]
     Output: [1,1,2,3,4,4]

  **Example 2:**

  ::


     Input: list1 = [], list2 = []
     Output: []

  **Example 3:**

  ::


     Input: list1 = [], list2 = [0]
     Output: [0]

   

  **Constraints:**

  - The number of nodes in both lists is in the range ``[0, 50]``.
  - ``-100 <= Node.val <= 100``
  - Both ``list1`` and ``list2`` are sorted in **non-decreasing** order.

  .. |image1| image:: https://assets.leetcode.com/uploads/2020/10/03/merge_ex1.jpg
solutions:
- name: Iterative
  explanation: |
    The general idea is to merge the lists by selecting the smaller node from
    ``list1`` and ``list2``. We then set the ``next`` field of the current node
    to the minimum node, advancing the ``list1``/``list2`` and node pointers.
    We can apply 2 tricks to simplify the code at the beginning and the end of
    the merge process.

    1. Rather than have a special case for the head of the merged list, start
       with a dummy node. New nodes are added after the dummy node, and we
       return ``dummy.next`` as the head of the merged list.
    2. Once we reach the end of one of the lists, we can simply point the
       ``next`` field of the current node to the other list, since it is
       already sorted.

  complexity: |
    :math:`m` is the length of the first input list and :math:`n` is the length of the second input list

    .. list-table::
       :header-rows: 1
       :widths: auto

       * - Measure
         - Complexity
         - Notes
       * - Time
         - :math:`O(m + n)`
         - go through both lists
       * - Auxiliary Space
         - :math:`O(1)`
         -
