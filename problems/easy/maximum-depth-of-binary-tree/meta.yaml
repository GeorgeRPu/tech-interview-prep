slug: maximum-depth-of-binary-tree
patterns:
- Tree
- Depth-First Search
- Breadth-First Search
- Binary Tree
description_rst: |
  Given the ``root`` of a binary tree, return *its maximum depth*.

  A binary tree's **maximum depth** is the number of nodes along the
  longest path from the root node down to the farthest leaf node.

   

  **Example 1:**

  |image1|

  ::


     Input: root = [3,9,20,null,null,15,7]
     Output: 3

  **Example 2:**

  ::


     Input: root = [1,null,2]
     Output: 2

   

  **Constraints:**

  - The number of nodes in the tree is in the range
    ``[0, 10``\ :sup:```4```\ ``]``.
  - ``-100 <= Node.val <= 100``

  .. |image1| image:: https://assets.leetcode.com/uploads/2020/11/26/tmp-tree.jpg
solutions:
- name: Recursive
  explanation: |
    If ``root`` is ``None``, the height of a tree is 0. Otherwise, the height of a
    tree is the 1 plus the maximum of the heights of the left and right subtrees.
  complexity: |
    | :math:`d` is the maximum depth of the tree
    | Time: :math:`O(d)` — visit every node along the longest path from the root to a leaf
    | Auxiliary Space: :math:`O(1)`
