slug: balanced-binary-tree
patterns:
- Tree
- Depth-First Search
- Binary Tree
description_rst: |
  Given a binary tree, determine if it is height-balanced.

  **Example 1:**

  |image1|

  ::

     Input: root = [3,9,20,null,null,15,7]
     Output: true

  **Example 2:**

  |image2|

  ::

     Input: root = [1,2,2,3,3,null,null,4,4]
     Output: false

  **Example 3:**

  ::

     Input: root = []
     Output: true

  **Constraints:**

  - The number of nodes in the tree is in the range ``[0, 5000]``.
  - ``-10``\ :sup:```4```\ ``<= Node.val <= 10``\ :sup:```4```

  .. |image1| image:: https://assets.leetcode.com/uploads/2020/10/06/balance_1.jpg
  .. |image2| image:: https://assets.leetcode.com/uploads/2020/10/06/balance_2.jpg
solutions:
- name: DFS
